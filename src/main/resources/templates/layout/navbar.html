<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <img th:src="@{/images/logo.png}" alt="G3 Alquiler Vacacional"
                 height="32" class="me-2 rounded-3">
            <span>G3 Alquiler Vacacional</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/listings}">
                        <i class="fa-solid fa-house me-1"></i> Propiedades
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/bookings}">
                        <i class="fa-solid fa-calendar me-1"></i> Reservas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reviews}">
                        <i class="fa-solid fa-star me-1"></i> Reseñas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/messages}">
                        <i class="fa-solid fa-envelope me-1"></i> Mensajes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/amenities}">
                        <i class="fa-solid fa-spa me-1"></i> Comodidades
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
